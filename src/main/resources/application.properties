spring.application.name=hungry-kafka

# SQLite Database Configuration
spring.datasource.url=jdbc:sqlite:hungry-kafka.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.hibernate.ddl-auto=none

# Hibernate Dialect for SQLite
spring.jpa.properties.hibernate.dialect=org.hibernate.community.dialect.SQLiteDialect

# Flyway Migrations
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
logging.level.org.flywaydb=DEBUG

# Kafka
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=hungry-kafka-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Kafka Streams Properties
spring.kafka.streams.properties.cache.max.bytes.buffering=0
spring.kafka.streams.properties.commit.interval.ms=100
# Application Configuration - Preference Multipliers
app.preference.cart.multiplier=1.01
app.preference.itemview.multiplier=1.05
app.preference.order.multiplier=1.10

# Hot Item Detection Configuration
# Number of times a client must add the same product to cart within the window
# to be flagged as a hot lead, and the size of that window in seconds.
app.hot-item.threshold=10
app.hot-item.duration-seconds=60

# Abandoned Cart Detection Configuration
# Window after a cart ADD within which an order must be placed; otherwise the
# cart is flagged as abandoned when the window closes.
app.abandoned-cart.window-minutes=1
