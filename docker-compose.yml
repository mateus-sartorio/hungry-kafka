services:
  broker1:
    image: apache/kafka:latest
    container_name: broker1
    restart: unless-stopped
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_LISTENERS: 'INTERNAL://:19092,HOST://:9092,CONTROLLER://:9093'
      KAFKA_ADVERTISED_LISTENERS: 'INTERNAL://broker1:19092,HOST://localhost:9092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'INTERNAL:PLAINTEXT,HOST:PLAINTEXT,CONTROLLER:PLAINTEXT'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@broker1:9093,2@broker2:9095,3@broker3:9097'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'INTERNAL'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'

  broker2:
    image: apache/kafka:latest
    container_name: broker2
    restart: unless-stopped
    ports:
      - "9094:9094"
      - "9095:9095"
    environment:
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_LISTENERS: 'INTERNAL://:19094,HOST://:9094,CONTROLLER://:9095'
      KAFKA_ADVERTISED_LISTENERS: 'INTERNAL://broker2:19094,HOST://localhost:9094'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'INTERNAL:PLAINTEXT,HOST:PLAINTEXT,CONTROLLER:PLAINTEXT'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@broker1:9093,2@broker2:9095,3@broker3:9097'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'INTERNAL'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'

  broker3:
    image: apache/kafka:latest
    container_name: broker3
    restart: unless-stopped
    ports:
      - "9096:9096"
      - "9097:9097"
    environment:
      KAFKA_NODE_ID: 3
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_LISTENERS: 'INTERNAL://:19096,HOST://:9096,CONTROLLER://:9097'
      KAFKA_ADVERTISED_LISTENERS: 'INTERNAL://broker3:19096,HOST://localhost:9096'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'INTERNAL:PLAINTEXT,HOST:PLAINTEXT,CONTROLLER:PLAINTEXT'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@broker1:9093,2@broker2:9095,3@broker3:9097'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'INTERNAL'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hungry-kafka-app
    restart: unless-stopped
    depends_on:
      - broker1
      - broker2
      - broker3
    ports:
      - "8081:8080"
    environment:
      # Reach the brokers over the internal docker-network listeners
      SPRING_KAFKA_BOOTSTRAP_SERVERS: 'broker1:19092,broker2:19094,broker3:19096'
    volumes:
      # Persist the SQLite database across container restarts
      - ./hungry-kafka.db:/app/hungry-kafka.db
